<!doctype html>
<html>
<head><meta charset="utf-8"><title>Register</title><link rel="stylesheet" href="/static/styles.css"></head>
<body>
<div class="app"><div class="card" style="max-width:420px;margin:80px auto">
  <h2>Đăng ký</h2>
  <form data-auth="register" method="post" action="/api/register">
    <label>Username</label>
    <input name="username" placeholder="Tên (min 3 ký tự)" required>
    <label>Mật khẩu</label>
    <input name="password" type="password" placeholder="Mật khẩu (ít nhất 8 ký tự, 1 chữ hoa, 1 số)" required>
    <label>Xác nhận mật khẩu</label>
    <input name="password2" type="password" placeholder="Nhập lại mật khẩu" required>
    <button class="btn" type="submit">Tạo tài khoản</button>
  </form>
  <div style="margin-top:12px"><a href="/login">Bạn đã có tài khoản?</a></div>
</div></div>
<script>
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('/static/sw.js').catch(()=>{}); }
</script>
<script src="/static/auth.js"></script>
</body>
</html>
